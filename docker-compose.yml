# =============================================================================
# docker-compose.yml — Autos-AI
# Entorno local de desarrollo y pruebas
# =============================================================================

version: "3.9"

services:
  # ---- Agente principal ------------------------------------------------------
  autos-ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: autos-ai-agent
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - LOG_LEVEL=DEBUG
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account.json
      - VERTEXAI_PROJECT=${VERTEXAI_PROJECT}
      - VERTEXAI_LOCATION=${VERTEXAI_LOCATION}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-001}
      - GCS_BUCKET_SUBMISSIONS=${GCS_BUCKET_SUBMISSIONS}
      - GCS_BUCKET_OUTPUTS=${GCS_BUCKET_OUTPUTS}
      - FIRESTORE_DATABASE=${FIRESTORE_DATABASE:-(default)}
      - FIRESTORE_COLLECTION_SOLICITUDES=${FIRESTORE_COLLECTION_SOLICITUDES:-solicitudes_seguros}
      - DOCUMENT_AI_PROCESSOR_ID=${DOCUMENT_AI_PROCESSOR_ID}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-autos_ai_analytics}
      - ADK_APP_NAME=${ADK_APP_NAME:-autos-ai-agent}
    volumes:
      - ./app:/app/app:ro
      - ./credentials:/app/credentials:ro
      - submissions_data:/app/uploads
      - outputs_data:/app/outputs
    networks:
      - autos-ai-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---- ADK Web Playground (solo desarrollo) ----------------------------------
  adk-playground:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: adk-playground
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account.json
      - VERTEXAI_PROJECT=${VERTEXAI_PROJECT}
      - VERTEXAI_LOCATION=${VERTEXAI_LOCATION}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-001}
    volumes:
      - ./app:/app/app:ro
      - ./credentials:/app/credentials:ro
    command: ["adk", "web", "app/", "--port", "8000", "--host", "0.0.0.0"]
    networks:
      - autos-ai-net
    profiles:
      - dev
    depends_on:
      - autos-ai-agent

  # ---- Firestore Emulator (desarrollo local sin GCP) -------------------------
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    container_name: firestore-emulator
    ports:
      - "8088:8088"
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8088
      --project=${GOOGLE_CLOUD_PROJECT:-autos-ai}
    environment:
      - CLOUDSDK_CORE_PROJECT=${GOOGLE_CLOUD_PROJECT:-autos-ai}
    networks:
      - autos-ai-net
    profiles:
      - emulators

volumes:
  submissions_data:
  outputs_data:

networks:
  autos-ai-net:
    driver: bridge
