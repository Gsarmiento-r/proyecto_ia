# =============================================================================
# deployment/cloudbuild.yaml — Pipeline CI/CD con Cloud Build
# =============================================================================
# Trigger: Push a branch 'main' o 'release/*'
# Ejecutar manualmente: gcloud builds submit --config deployment/cloudbuild.yaml

substitutions:
  _REGION: us-central1
  _PROJECT_ID: autos-ai
  _APP_NAME: autos-ai
  _IMAGE_NAME: autos-ai-agent
  _REPO_NAME: autos-ai-repo
  _SERVICE_NAME: autos-ai-agent
  _ENV: production

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  substitution_option: ALLOW_LOOSE

tags:
  - autos-ai
  - cloud-run
  - mlops

steps:
  # ── Paso 1: Instalar dependencias y ejecutar tests ────────────────────────
  - name: "python:3.12-slim"
    id: "install-and-test"
    entrypoint: bash
    args:
      - -c
      - |
        pip install uv --quiet
        uv sync --frozen
        uv run pytest tests/ -v --tb=short --no-header \
          --junitxml=test-results/junit.xml || exit 1
        echo "✅ Tests pasados exitosamente"

  # ── Paso 2: Lint y calidad de código ─────────────────────────────────────
  - name: "python:3.12-slim"
    id: "lint"
    entrypoint: bash
    args:
      - -c
      - |
        pip install uv --quiet
        uv run ruff check app/ --output-format=github
        uv run ruff format app/ --check
        echo "✅ Lint completado"

  # ── Paso 3: Build de imagen Docker ───────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - build
      - --platform=linux/amd64
      - --tag=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA
      - --tag=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - .
    waitFor: ["install-and-test", "lint"]

  # ── Paso 4: Escaneo de vulnerabilidades ──────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "scan-vulnerabilities"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts docker images scan \
          ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA \
          --format="json" \
          --project=${_PROJECT_ID} || true
        echo "✅ Escaneo de vulnerabilidades completado"
    waitFor: ["build-image"]

  # ── Paso 5: Push de imagen a Artifact Registry ───────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}
    waitFor: ["build-image"]

  # ── Paso 6: Despliegue a Cloud Run ───────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy-cloud-run"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --project=${_PROJECT_ID}
      - --platform=managed
      - --memory=2Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=10
      - --timeout=300
      - --concurrency=10
      - --set-env-vars=APP_ENV=${_ENV},GOOGLE_CLOUD_PROJECT=${_PROJECT_ID},VERTEXAI_PROJECT=${_PROJECT_ID},VERTEXAI_LOCATION=${_REGION}
      - --service-account=${_APP_NAME}-sa@${_PROJECT_ID}.iam.gserviceaccount.com
      - --labels=commit-sha=$COMMIT_SHA,managed-by=cloud-build
    waitFor: ["push-image"]

  # ── Paso 7: Smoke test post-despliegue ───────────────────────────────────
  - name: "curlimages/curl:latest"
    id: "smoke-test"
    entrypoint: sh
    args:
      - -c
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --format="value(status.url)" 2>/dev/null) || true
        if [ -n "$SERVICE_URL" ]; then
          echo "Testing $SERVICE_URL/health ..."
          curl -sf "$SERVICE_URL/health" || exit 1
          echo "✅ Smoke test exitoso"
        else
          echo "⚠️ No se pudo obtener la URL del servicio"
        fi
    waitFor: ["deploy-cloud-run"]

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}:latest"

artifacts:
  objects:
    location: "gs://${_PROJECT_ID}-outputs/build-artifacts/$BUILD_ID/"
    paths:
      - "test-results/junit.xml"
